schema_version = 1

[game]
id = "harpoon-moon"
title = "Harpoon Moon"
version = "1.0.0"
template = "arcade-action"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 5
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
up = ["X3", "Y2"]
down = ["X1", "Y4"]
charge_fire = ["A"]
lure = ["B"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "hunt"
[[scenes]]
id = "result"

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable moon hunt from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["hunter and targets are visible", "oxygen is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Hunt controls"
goal = "Move, charge and release a shot, then exercise the lure."
plan = "tests/play/interaction.json"
required_checks = ["movement works", "charge is visible", "release fires", "lure changes target behavior"]
audio = true

[[play.scenarios]]
id = "success"
title = "Successful tag"
goal = "Lure the creature into range, charge, and land a tag."
plan = "tests/play/success.json"
required_checks = ["charge grows while held", "lure closes distance", "release lands a tag"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Oxygen boundary"
goal = "Wait until oxygen is exhausted."
plan = "tests/play/failure.json"
required_checks = ["oxygen counts down", "oxygen failure result appears", "result remains stable"]

[[play.scenarios]]
id = "reset"
title = "Hunt replay"
goal = "Reach oxygen failure and replay the hunt."
plan = "tests/play/reset.json"
required_checks = ["oxygen failure is reached", "replay restores hunter and creature", "oxygen and tags reset"]

[[play.scenarios]]
id = "deterministic"
title = "Deterministic tag replay"
goal = "Replay the successful tag path from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["charge, tag, and creature state match the success path", "frame and WAV evidence match on repeated execution"]
audio = true
