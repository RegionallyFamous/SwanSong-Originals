[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Persistent moon title"
goal = "Hold on the title until the player explicitly starts."
plan = "tests/play/neutral.json"
required_checks = ["project-owned lunar artwork and code-rendered title remain stable", "PRESS START blinks", "title music plays", "hunt does not auto-start"]
audio = true

[[play.scenarios]]
id = "attract"
title = "Attract briefing"
goal = "Idle into the lure briefing, then return with input."
plan = "tests/play/attract.json"
required_checks = ["idle title changes to an attract briefing", "lure, gold charge, and reel ideas are demonstrated", "input returns to the title"]
audio = true

[[play.scenarios]]
id = "menu-input"
title = "Dual-cluster title navigation"
goal = "Navigate the title briefing with both directional clusters."
plan = "tests/play/menu-input.json"
required_checks = ["X cluster changes the title briefing page", "Y cluster changes it back", "selection feedback is visible and audible"]
audio = true

[[play.scenarios]]
id = "tutorial"
title = "Playable first hunt"
goal = "Learn movement, lure exposure, and the gold charge window through play."
plan = "tests/play/tutorial.json"
required_checks = ["movement advances the first lesson", "B pulls the creature into an exposed window", "the charge bar marks a gold release window", "a valid shot earns the first tag"]
audio = true

[[play.scenarios]]
id = "interaction"
title = "Miss and reel recovery"
goal = "Make a bad release, recover its pressure, then open another lure window."
plan = "tests/play/interaction.json"
required_checks = ["bad charge timing is a readable miss", "oxygen pressure changes", "holding B reels the line faster and restores most of the miss cost", "the hunt remains recoverable"]
audio = true

[[play.scenarios]]
id = "pause"
title = "Pause, resume, and restart"
goal = "Pause during a hunt, prove the state is frozen, resume, then restart."
plan = "tests/play/pause.json"
required_checks = ["START opens a distinct pause panel", "oxygen and creatures freeze while paused", "START resumes", "B restarts the playable tutorial"]
audio = true

[[play.scenarios]]
id = "success"
title = "Leviathan victory"
goal = "Tag three staged creatures and land one timed hit in each leviathan phase."
plan = "tests/play/success.json"
outcome = "tests/outcomes/success.json"
required_checks = ["calm, shy, and diving creatures demand readable adjustments", "the leviathan has track, sweep, and abyss phases", "oxygen pressure intensifies without making misses terminal", "result shows rank, time, score, oxygen, misses, and replay"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Oxygen boundary"
goal = "Enter the hunt, then exhaust oxygen pressure."
plan = "tests/play/failure.json"
outcome = "tests/outcomes/failure.json"
required_checks = ["oxygen warning is visible before empty", "oxygen failure has a distinct stable result", "failure still offers replay and title"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Failure and exact retry"
goal = "Reach oxygen failure and replay the hunt."
plan = "tests/play/reset.json"
outcome = "tests/outcomes/reset.json"
required_checks = ["failure is reached", "A replay restores the first playable lesson", "oxygen, clocks, RNG, AI, score, music, sprites, and input reset"]
audio = true

[[play.scenarios]]
id = "save-restart"
title = "Record journal"
goal = "Complete a hunt, store its rank, and return to the title record panel."
plan = "tests/play/save-restart.json"
required_checks = ["the completed score and rank are journaled", "START returns to a title that displays the record", "corrupt/interrupted slot recovery remains a Save/RTC Laboratory gate"]
audio = true

[[play.scenarios]]
id = "audio"
title = "Complete hunt mix"
goal = "Capture a complete Black Tides loop while actions arbitrate effects on the eligible voice."
plan = "tests/play/audio.json"
required_checks = ["the full A/B/turnaround hunt form is present", "lure, charge, miss, reel, pause, and resume cues remain distinct", "effect arbitration restores held music state"]
audio = true

[[play.scenarios]]
id = "deterministic"
title = "Deterministic leviathan replay"
goal = "Replay the complete victory route from a fresh boot."
plan = "tests/play/deterministic.json"
outcome = "tests/outcomes/deterministic.json"
required_checks = ["tags, phases, score, oxygen, misses, ending, and state hash match the success path", "PNG and WAV evidence match on repeated execution"]
audio = true
