schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:47c8f48d2e2c7f3d4ed8b6e2adea963007d8ce325b90f410d7509d77c25f3001"

[game]
id = "harpoon-moon"
title = "Harpoon Moon"
version = "1.1.0"
template = "arcade-action"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 5
version = 2
save_type = "eeprom-1kb"
save_bytes = 256
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
charge_fire = ["A"]
replay = ["A"]
lure = ["B"]
retry = ["B"]
start_or_pause = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 448
palettes = 16
sprites = 40
sprites_per_scanline = 12
audio_bytes = 24576

[resources]
work_ram_bytes = 8192
sprites = 36
sprites_per_scanline = 10

[quality]
standard_version = 1
attract_after_frames = 755
menu_uses_both_clusters = true
records = ["best_score", "best_rank", "tutorial_complete"]

[quality.scenes]
title = "intro"
gameplay = "hunt"
tutorial = "hunt"
pause = "hunt"
result = "result"

[[scenes]]
id = "intro"
assets = ["title_art", "title_music"]

[[scenes]]
id = "hunt"
assets = ["hunt_music", "boss_music"]

[[scenes]]
id = "result"
assets = ["result_music"]

[[assets]]
id = "title_art"
type = "fullscreen"
source = "assets/graphics/title.png"
group = "intro"
flip_dedupe = true

[[assets]]
id = "title_music"
type = "music"
source = "assets/audio/title.toml"
group = "intro"

