schema_version = 1

[sdk]
version = "0.4.0"
revision = "sha256:4a08d6fa29bf49947576292574d0d868003add6537e01aa0438c4b6eedb85ffe"

[game]
id = "harpoon-moon"
title = "Harpoon Moon"
version = "1.0.0"
template = "arcade-action"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 5
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
charge_fire = ["A"]
lure = ["B"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "hunt"
[[scenes]]
id = "result"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable moon hunt from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["hunter and targets are visible", "oxygen is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Hunt controls"
goal = "Move, charge and release a shot, then exercise the lure."
plan = "tests/play/interaction.json"
required_checks = ["movement works", "charge is visible", "release fires", "lure changes target behavior"]
audio = true

[[play.scenarios]]
id = "success"
title = "Hunt victory"
goal = "Tag three moon creatures, then land three charged hits on the surfaced boss."
plan = "tests/play/success.json"
required_checks = ["three creature tags are filled", "the boss appears after the third tag", "three boss hits empty its health", "victory result appears"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Oxygen boundary"
goal = "Wait until oxygen is exhausted."
plan = "tests/play/failure.json"
required_checks = ["oxygen counts down", "oxygen failure result appears", "result remains stable"]

[[play.scenarios]]
id = "reset"
title = "Hunt replay"
goal = "Reach oxygen failure and replay the hunt."
plan = "tests/play/reset.json"
required_checks = ["oxygen failure is reached", "replay restores hunter and creature", "oxygen and tags reset"]

[[play.scenarios]]
id = "deterministic"
title = "Deterministic victory replay"
goal = "Replay the complete six-hit victory path from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["tags, boss health, victory frame, and sound match the success path", "frame and WAV evidence match on repeated execution"]
audio = true
