schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:905d1b7683ea55aebb90703bc4dc708ae7a436c98dae1474e67c9df89601a35c"

[game]
id = "mote-sound-terminal"
title = "Mote Sound Terminal"
version = "1.0.0"
template = "menu-puzzle"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 1
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
previous_track = ["X4", "Y1"]
next_track = ["X2", "Y3"]
tempo_up = ["X1", "Y4"]
tempo_down = ["X3", "Y2"]
toggle_play = ["A"]
toggle_scope = ["B"]
reset = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
assets = ["intro"]

[[scenes]]
id = "terminal"
assets = ["gameplay", "track_0", "track_1", "track_2"]

[[assets]]
id = "intro"
type = "fullscreen"
source = "assets/graphics/intro.png"
group = "intro"
flip_dedupe = true

[[assets]]
id = "gameplay"
type = "metatiles"
source = "assets/graphics/gameplay.png"
group = "terminal"
flip_dedupe = true

[[assets]]
id = "track_0"
type = "music"
source = "assets/audio/track-0.toml"
group = "terminal"

[[assets]]
id = "track_1"
type = "music"
source = "assets/audio/track-1.toml"
group = "terminal"

[[assets]]
id = "track_2"
type = "music"
source = "assets/audio/track-2.toml"
group = "terminal"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable terminal screen from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["terminal is visible", "scope is active", "no crash or hang"]
audio = true

[[play.scenarios]]
id = "interaction"
title = "Terminal controls"
goal = "Change track and tempo, switch scope, pause, resume, and reset."
plan = "tests/play/interaction.json"
required_checks = ["track changes", "tempo changes", "scope changes", "playback toggles", "reset restores defaults"]
audio = true

[[play.scenarios]]
id = "success"
title = "Four-channel terminal mix"
goal = "Exercise the terminal controls while all four sequencer voices remain audible and drive the scope."
plan = "tests/play/success.json"
required_checks = ["track changes", "tempo changes", "scope follows channel activity", "four-channel mix is audible", "pause and resume both work"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Tempo boundary"
goal = "Drive tempo to its lower boundary without destabilizing playback."
plan = "tests/play/failure.json"
required_checks = ["tempo stops at the declared minimum", "terminal remains responsive", "playback continues"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Terminal reset"
goal = "Change terminal state, restore its defaults, and restart the four-channel sequencer from row zero."
plan = "tests/play/reset.json"
required_checks = ["track and tempo first change", "reset restores defaults", "sequencer restarts from row zero", "scope returns to the default channel bank"]
audio_expectation = "audible"

[[play.scenarios]]
id = "deterministic"
title = "Deterministic terminal replay"
goal = "Replay the same terminal utility path from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["terminal state matches the utility path", "frame and WAV evidence match on repeated execution"]
audio = true
