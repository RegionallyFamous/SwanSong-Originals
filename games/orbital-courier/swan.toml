schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:47c8f48d2e2c7f3d4ed8b6e2adea963007d8ce325b90f410d7509d77c25f3001"

[game]
id = "orbital-courier"
title = "Orbital Courier"
version = "1.1.0"
template = "arcade-action"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 2
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
up = ["X3", "Y2"]
down = ["X1", "Y4"]
replay = ["A"]
start_or_pause = ["START"]
retry = ["B"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 768
palettes = 16
sprites = 24
sprites_per_scanline = 16
audio_bytes = 12288

[resources]
work_ram_bytes = 8192
sprites = 16
sprites_per_scanline = 8

[[scenes]]
id = "intro"
assets = ["intro", "title_music"]
[[scenes]]
id = "delivery"
assets = ["gameplay", "delivery_music"]
[[scenes]]
id = "result"
assets = ["gameplay", "delivery_music"]

[[assets]]
id = "intro"
type = "fullscreen"
source = "assets/graphics/intro.png"
group = "intro"
flip_dedupe = true

[[assets]]
id = "gameplay"
type = "metatiles"
source = "assets/graphics/gameplay.png"
group = "delivery"
flip_dedupe = true

[[assets]]
id = "title_music"
type = "music"
source = "assets/audio/title.toml"
group = "intro"

[[assets]]
id = "delivery_music"
type = "music"
source = "assets/audio/delivery.toml"
group = "delivery"

[[assets]]
id = "move"
type = "sfx"
source = "assets/audio/move.toml"
group = "common"

[[assets]]
id = "blocked"
type = "sfx"
source = "assets/audio/blocked.toml"
group = "common"

[[assets]]
id = "pickup"
type = "sfx"
source = "assets/audio/pickup.toml"
group = "common"

[[assets]]
id = "charge"
type = "sfx"
source = "assets/audio/charge.toml"
group = "common"

[[assets]]
id = "relay"
type = "sfx"
source = "assets/audio/relay.toml"
group = "common"

[[assets]]
id = "collision"
type = "sfx"
source = "assets/audio/collision.toml"
group = "common"

[[assets]]
id = "pause"
type = "sfx"
source = "assets/audio/pause.toml"
group = "common"

[[assets]]
id = "retry"
type = "sfx"
source = "assets/audio/retry.toml"
group = "common"

[[assets]]
id = "delivered"
type = "sfx"
source = "assets/audio/delivered.toml"
group = "common"

[[assets]]
id = "failure"
type = "sfx"
source = "assets/audio/failure.toml"
group = "common"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Hold on the persistent title screen until the player explicitly starts."
plan = "tests/play/neutral.json"
outcome = "tests/outcomes/neutral.json"
required_checks = ["project-owned title artwork and code-rendered title remain stable", "PRESS START blinks", "title music plays without input", "delivery does not auto-start"]
audio = true

[[play.scenarios]]
id = "interaction"
title = "Courier onboarding"
goal = "Start, follow the first movement lesson, hit a boundary, then pause and resume."
plan = "tests/play/interaction.json"
outcome = "tests/outcomes/interaction.json"
required_checks = ["D-pad onboarding appears before the first move", "movement and blocked-route feedback are distinct", "fuel changes only on valid moves", "pause freezes the route and resume continues", "traffic actors use sprites"]
audio = true

[[play.scenarios]]
id = "success"
title = "Completed orbital delivery"
goal = "Choose the charger detour, collect the parcel, verify the relay, and reach the depot."
plan = "tests/play/success.json"
outcome = "tests/outcomes/success.json"
required_checks = ["charger detour visibly restores fuel", "courier collects and visibly carries the parcel", "moving traffic and express-lane fuel pressure affect the run", "relay verification unlocks the depot leg", "result shows rank, time, score, and traffic hits"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Fuel failure"
goal = "Ignore the mission and exhaust the route fuel budget."
plan = "tests/play/failure.json"
outcome = "tests/outcomes/failure.json"
required_checks = ["valid movement drains fuel", "fuel reaches zero", "the distinct FUEL EMPTY result appears and remains stable"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Fuel failure and replay"
goal = "Exhaust fuel, reach the failure result, and replay."
plan = "tests/play/reset.json"
outcome = "tests/outcomes/reset.json"
required_checks = ["fuel failure is reached", "A replay restores the opening tutorial and full fuel", "traffic, clocks, score, cargo, route flags, graphics, and music reset"]
audio = true

[[play.scenarios]]
id = "deterministic"
title = "Deterministic delivery replay"
goal = "Replay the completed delivery path from a fresh boot."
plan = "tests/play/deterministic.json"
outcome = "tests/outcomes/deterministic.json"
required_checks = ["charger, cargo, relay, traffic, score, and ending match the success path", "frame and WAV evidence match on repeated execution"]
audio = true
