schema_version = 1

[sdk]
version = "0.2.0"
revision = "sha256:a9d93aa45ba8d1d5c5ce62cc04dd9f59692d7e0a849a899f6ceac15118b9b4d0"

[game]
id = "orbital-courier"
title = "Orbital Courier"
version = "1.0.0"
template = "arcade-action"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 2
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
up = ["X3", "Y2"]
down = ["X1", "Y4"]
replay = ["A"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
assets = ["intro"]
[[scenes]]
id = "delivery"
assets = ["gameplay"]
[[scenes]]
id = "result"
assets = ["gameplay"]

[[assets]]
id = "intro"
type = "fullscreen"
source = "assets/graphics/intro.png"
group = "intro"
flip_dedupe = true

[[assets]]
id = "gameplay"
type = "metatiles"
source = "assets/graphics/gameplay.png"
group = "delivery"
flip_dedupe = true

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable courier playfield from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["courier and route are visible", "fuel state is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Courier movement"
goal = "Move through the route and verify walls and state feedback."
plan = "tests/play/interaction.json"
required_checks = ["movement changes position", "walls block movement", "fuel changes only on valid moves"]
audio = true

[[play.scenarios]]
id = "success"
title = "Completed delivery"
goal = "Collect the parcel and deliver it to the depot from a fresh route."
plan = "tests/play/success.json"
required_checks = ["courier collects the parcel", "depot delivery reaches the win result", "fuel reflects the complete valid route"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Route boundary"
goal = "Attempt blocked movement at the route edge."
plan = "tests/play/failure.json"
required_checks = ["blocked moves do not change position", "blocked moves do not consume fuel", "route remains playable"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Fuel failure and replay"
goal = "Exhaust fuel, reach the failure result, and replay."
plan = "tests/play/reset.json"
required_checks = ["fuel reaches zero", "failure result appears", "replay restores the opening route and fuel"]

[[play.scenarios]]
id = "deterministic"
title = "Deterministic delivery replay"
goal = "Replay the completed delivery path from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["win and fuel state match the success path", "frame and WAV evidence match on repeated execution"]
audio = true
