schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:131099c3601a31146bf09121ec6bf98a8059ddf58fd0c7935029d0a0c620969b"

[game]
id = "scrapframe-garage"
title = "Scrapframe Garage"
version = "1.0.0"
template = "menu-puzzle"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 3
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
previous_part = ["X4", "Y1"]
next_part = ["X2", "Y3"]
confirm = ["A"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "repair"
[[scenes]]
id = "result"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the first repair job from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["machine and parts are visible", "selection is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Part selection"
goal = "Change the selected part and install it for diagnostic feedback."
plan = "tests/play/interaction.json"
required_checks = ["selection changes", "install produces feedback", "next job remains playable"]
audio = true

[[play.scenarios]]
id = "success"
title = "Complete repair shift"
goal = "Install the correct part for all three repair jobs."
plan = "tests/play/success.json"
required_checks = ["each correct installation advances", "score reaches three", "results screen appears"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Wrong-part diagnostic"
goal = "Install an incorrect part, inspect the rejection, and keep the same job available for retry."
plan = "tests/play/failure.json"
required_checks = ["wrong part is rejected", "failure feedback is visible", "confirm returns to the same job for retry"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Repair shift replay"
goal = "Complete a shift and replay from the first job."
plan = "tests/play/reset.json"
required_checks = ["results screen is reached", "replay restores job one", "score and selection return to defaults"]
audio_expectation = "silent"

[[play.scenarios]]
id = "deterministic"
title = "Deterministic repair replay"
goal = "Replay the complete repair path from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["score and result match the success path", "frame and WAV evidence match on repeated execution"]
audio = true
