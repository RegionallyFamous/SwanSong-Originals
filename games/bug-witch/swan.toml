schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:47c8f48d2e2c7f3d4ed8b6e2adea963007d8ce325b90f410d7509d77c25f3001"

[game]
id = "bug-witch"
title = "Bug Witch"
version = "1.1.0"
template = "menu-puzzle"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 10
version = 2
save_type = "eeprom-128b"
save_bytes = 4
rtc = false

[controls.actions]
previous_socket = ["X4", "Y1"]
next_socket = ["X2", "Y3"]
previous_familiar = ["X3", "Y2"]
next_familiar = ["X1", "Y4"]
place = ["A"]
clear = ["B"]
run_circuit = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 12288
vram_tiles = 448
palettes = 12
sprites = 32
sprites_per_scanline = 12
audio_bytes = 12288

[resources]
work_ram_bytes = 8192
vram_tiles = 156
palettes = 3
sprites = 28
sprites_per_scanline = 10

[quality]
standard_version = 1
attract_after_frames = 755
menu_uses_both_clusters = true
records = ["best medal total", "completed spellbooks", "tutorial learned"]
save_load_hook = "load_records"
save_store_hook = "store_records"

[quality.scenes]
title = "intro"
gameplay = "circuit"
tutorial = "spellbook"
pause = "circuit"
result = "result"

[[scenes]]
id = "intro"
assets = ["title_art", "title_song", "move", "select"]
[[scenes]]
id = "circuit"
assets = ["circuit_song", "move", "select", "place", "clear", "undo", "cast", "fail", "hint", "solve", "finish", "pause"]
[[scenes]]
id = "result"
assets = ["circuit_song", "select", "finish"]
[[scenes]]
id = "spellbook"
assets = ["circuit_song", "move", "select", "place", "clear", "undo", "cast", "fail", "hint", "solve", "pause"]

[[assets]]
id = "title_art"
type = "fullscreen"
source = "assets/art/title-native.png"
group = "title"
flip_dedupe = true

[[assets]]
id = "title_song"
type = "music"
source = "assets/audio/title.toml"
group = "title"

[[assets]]
id = "circuit_song"
type = "music"
source = "assets/audio/circuit.toml"
group = "circuit"

[[assets]]
id = "move"
type = "sfx"
source = "assets/audio/move.toml"
group = "common"

[[assets]]
id = "select"
type = "sfx"
source = "assets/audio/select.toml"
group = "common"

[[assets]]
id = "place"
type = "sfx"
source = "assets/audio/place.toml"
group = "common"

[[assets]]
id = "clear"
type = "sfx"
source = "assets/audio/clear.toml"
group = "common"

[[assets]]
id = "undo"
type = "sfx"
source = "assets/audio/undo.toml"
group = "common"

[[assets]]
id = "cast"
type = "sfx"
source = "assets/audio/cast.toml"
group = "common"

[[assets]]
id = "fail"
type = "sfx"
source = "assets/audio/fail.toml"
group = "common"

[[assets]]
id = "hint"
type = "sfx"
source = "assets/audio/hint.toml"
group = "common"

[[assets]]
id = "solve"
type = "sfx"
source = "assets/audio/solve.toml"
group = "common"

[[assets]]
id = "finish"
type = "sfx"
source = "assets/audio/finish.toml"
group = "common"

[[assets]]
id = "pause"
type = "sfx"
source = "assets/audio/pause.toml"
group = "common"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Remain on the authored title until the player explicitly chooses a mode."
plan = "tests/play/neutral.json"
required_checks = ["title art and code lettering remain stable", "Play and Spellbook are visible", "START PLAY blinks", "title music is present", "gameplay does not auto-start"]
audio_expectation = "audible"

[[play.scenarios]]
id = "attract"
title = "Deterministic familiar demo"
goal = "Leave the title idle until the Spellbook demonstration places a familiar and casts, then use real input to return to the title."
plan = "tests/play/attract.json"
required_checks = ["title remains persistent before the declared idle threshold", "the demo uses production placement and signal rules", "real input exits the demo to the title", "held demo input never leaks into title control"]
audio_expectation = "audible"

[[play.scenarios]]
id = "menu-input"
title = "Both menu direction clusters"
goal = "Move the title choice once with the X cluster and once with the Y cluster without starting a mode."
plan = "tests/play/menu-input.json"
required_checks = ["X-cluster direction moves the title cursor", "Y-cluster direction moves the same cursor", "the selection returns to Play", "each move has visual and audio acknowledgement"]
audio_expectation = "audible"

[[play.scenarios]]
id = "interaction"
title = "Circuit controls"
goal = "Start, move, select, place, clear, undo, pause, resume, and cast."
plan = "tests/play/interaction.json"
outcome = "tests/outcomes/interaction.json"
required_checks = ["cursor and familiar sprites respond", "place clear and empty-cell undo work", "A plus B pauses and A resumes", "the spark visibly traverses the second layer", "controls use distinct prioritized cues"]
audio_expectation = "audible"

[[play.scenarios]]
id = "pause"
title = "Pause resume and retry"
goal = "Pause a placed circuit, resume it, pause again, retry the current puzzle, and cast from the reset board."
plan = "tests/play/pause.json"
required_checks = ["A plus B opens the pause overlay", "pause freezes signal and puzzle state", "A resumes the same board", "B from pause resets only the current puzzle"]
audio_expectation = "audible"

[[play.scenarios]]
id = "tutorial"
title = "Playable spellbook lesson"
goal = "Choose Spellbook, place the Flip familiar, and send a successful spark."
plan = "tests/play/tutorial.json"
outcome = "tests/outcomes/tutorial.json"
required_checks = ["the title mode selector opens Spellbook", "the lesson asks for one action at a time", "placing and casting use the production rules", "LESSON LEARNED appears", "A returns to the title"]
audio_expectation = "audible"

[[play.scenarios]]
id = "success"
title = "Solved spellbook"
goal = "Build and run valid solutions for all five circuits."
plan = "tests/play/success.json"
outcome = "tests/outcomes/success.json"
required_checks = ["Teach Test Twist and Climax circuits are all accepted", "each cast animates from input to target", "each puzzle awards a medal", "the completion result totals all five medals"]
audio_expectation = "audible"

[[play.scenarios]]
id = "failure"
title = "Invalid circuit"
goal = "Run the first puzzle with an empty circuit."
plan = "tests/play/failure.json"
outcome = "tests/outcomes/failure.json"
required_checks = ["an empty circuit is rejected after the full signal animation", "failure looks and sounds distinct", "a repeated failure reveals a pulsing hint", "the circuit remains editable"]
audio_expectation = "audible"

[[play.scenarios]]
id = "reset"
title = "Full spellbook replay"
goal = "Solve all five puzzles and replay from the first circuit."
plan = "tests/play/reset.json"
outcome = "tests/outcomes/reset.json"
required_checks = ["completion result appears", "A replay returns to puzzle one", "cells history medals attempts phase animation and selection reset", "game music restarts from row zero"]
audio_expectation = "audible"

[[play.scenarios]]
id = "save-restart"
title = "Tutorial record write"
goal = "Complete the playable lesson, store the learned flag transactionally, and return to the title record display. Corrupt-media and new-boot recovery remain a Save Laboratory gate, not a claim of this button plan."
plan = "tests/play/save-restart.json"
required_checks = ["lesson completion requests a journaled EEPROM store", "the returned title shows the learned record", "empty media remains safe", "corrupt and interrupted recovery require the separate Save Laboratory report"]
audio_expectation = "audible"

[[play.scenarios]]
id = "audio"
title = "Complete circuit music loop"
goal = "Run longer than one full Hexwire Sprint loop while navigation, action, pause, cast, and failure effects exercise deterministic channel-four arbitration."
plan = "tests/play/audio.json"
required_checks = ["gameplay BGM crosses a full A A2 B turnaround boundary", "effects remain distinct over music", "channel stealing restores the resolved music voice", "decoded WAV has no clipping silence or stuck note"]
audio_expectation = "audible"

[[play.scenarios]]
id = "deterministic"
title = "Deterministic spellbook replay"
goal = "Replay the complete five-circuit solution from a fresh boot."
plan = "tests/play/deterministic.json"
outcome = "tests/outcomes/deterministic.json"
required_checks = ["completion state and medal total match the success path", "canonical all-field state trace matches on repeated execution", "frame and WAV evidence match on repeated execution"]
audio_expectation = "audible"
