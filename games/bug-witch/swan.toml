schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:131099c3601a31146bf09121ec6bf98a8059ddf58fd0c7935029d0a0c620969b"

[game]
id = "bug-witch"
title = "Bug Witch"
version = "1.0.0"
template = "menu-puzzle"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 10
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
previous_socket = ["X4", "Y1"]
next_socket = ["X2", "Y3"]
previous_familiar = ["X3", "Y2"]
next_familiar = ["X1", "Y4"]
place = ["A"]
clear = ["B"]
run_circuit = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "circuit"
[[scenes]]
id = "result"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable circuit screen from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["sockets and familiars are visible", "cursor is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Circuit controls"
goal = "Move the cursor, change familiar, place, clear, and run the circuit."
plan = "tests/play/interaction.json"
required_checks = ["cursor moves", "familiar changes", "place and clear work", "run produces feedback"]
audio = true

[[play.scenarios]]
id = "success"
title = "Solved spellbook"
goal = "Build and run valid solutions for all five circuits."
plan = "tests/play/success.json"
required_checks = ["all required familiar mixes are placed", "all five runs are accepted", "completion result appears"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Invalid circuit"
goal = "Run the first puzzle with an empty circuit."
plan = "tests/play/failure.json"
required_checks = ["invalid run is rejected", "failure feedback is visible", "puzzle remains editable"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Full spellbook replay"
goal = "Solve all five puzzles and replay from the first circuit."
plan = "tests/play/reset.json"
required_checks = ["completion result appears", "replay returns to puzzle one", "cells and familiar selection reset"]
audio_expectation = "silent"

[[play.scenarios]]
id = "deterministic"
title = "Deterministic spellbook replay"
goal = "Replay the complete five-circuit solution from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["completion state matches the success path", "frame and WAV evidence match on repeated execution"]
audio = true
