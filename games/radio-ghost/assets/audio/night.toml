# "Midnight Carrier" — an original 16-bar A-minor receiver groove. The lead
# states a five-note search hook, the triangle-like bass supplies the grid,
# the carrier voice changes implied harmony, and channel four leaves every
# other row open for prioritized gameplay effects. A/A'/B/turnaround create a
# roughly 30.5-second native loop rather than a one-pattern microloop.
