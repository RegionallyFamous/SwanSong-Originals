# "Dead Air Waltz" — an original 8-bar A-minor title loop for game-soundtrack
# listeners. A three-note bell call answers a descending bass pulse while the
# third voice hangs like an unstable carrier. The sparse fourth voice marks
# the half-time grid; the last four rows pull cleanly back to the opening A.
