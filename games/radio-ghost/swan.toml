schema_version = 1

[sdk]
version = "0.4.0"
revision = "sha256:4a08d6fa29bf49947576292574d0d868003add6537e01aa0438c4b6eedb85ffe"

[game]
id = "radio-ghost"
title = "Radio Ghost"
version = "1.0.0"
template = "menu-puzzle"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 4
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
tune_down = ["X4", "Y1"]
tune_up = ["X2", "Y3"]
gain_up = ["X3", "Y2"]
gain_down = ["X1", "Y4"]
lock_signal = ["A"]
toggle_gate = ["B"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "tuning"
[[scenes]]
id = "result"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable receiver screen from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["frequency and gain are visible", "clock is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Receiver controls"
goal = "Tune frequency, adjust gain, switch the gate, and attempt a lock."
plan = "tests/play/interaction.json"
required_checks = ["frequency changes", "gain changes", "gate changes", "wide gate trades a larger lock window for gain", "tuning produces audible feedback"]
audio = true

[[play.scenarios]]
id = "success"
title = "Complete signal acquisition"
goal = "Use the wide gate and gain controls to lock all three hidden signals."
plan = "tests/play/success.json"
required_checks = ["all three targets lock", "wide locks spend gain", "signal result appears", "lock tones use the model frequencies"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Dawn failure"
goal = "Make repeated bad locks until the night ends."
plan = "tests/play/failure.json"
required_checks = ["bad locks reduce remaining time", "dawn result appears", "receiver does not hang"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Receiver replay"
goal = "Reach dawn and replay from a fresh night."
plan = "tests/play/reset.json"
required_checks = ["dawn result is reached", "replay restores the starting frequency", "night clock resets"]
audio_expectation = "silent"

[[play.scenarios]]
id = "deterministic"
title = "Deterministic receiver replay"
goal = "Replay the complete three-signal acquisition from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["three-lock result matches the success path", "frame and WAV evidence match on repeated execution"]
audio = true
