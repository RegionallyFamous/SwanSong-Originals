schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:47c8f48d2e2c7f3d4ed8b6e2adea963007d8ce325b90f410d7509d77c25f3001"

[game]
id = "radio-ghost"
title = "Radio Ghost"
version = "1.1.0"
template = "menu-puzzle"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "title"

[cartridge]
publisher_id = 0
game_id = 4
version = 1
save_type = "sram-8kb"
save_bytes = 8
rtc = false

[controls.actions]
tune_down = ["X4", "Y1"]
tune_up = ["X2", "Y3"]
gain_up = ["X3", "Y2"]
gain_down = ["X1", "Y4"]
lock_signal = ["A"]
toggle_gate = ["B"]
pause = ["START"]
confirm_title = ["A", "START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 12288
vram_tiles = 448
palettes = 12
sprites = 64
sprites_per_scanline = 24
audio_bytes = 32768

[resources]
work_ram_bytes = 8192
vram_tiles = 123
palettes = 1
sprites = 24
sprites_per_scanline = 4

[quality]
standard_version = 1
attract_after_frames = 755
menu_uses_both_clusters = true
records = ["best score", "best time remaining", "signals discovered"]
save_load_hook = "load_records"
save_store_hook = "store_records"

[quality.evidence]
title_png = "tests/evidence/title.png"
gameplay_png = "tests/evidence/gameplay.png"
result_png = "tests/evidence/result.png"
audio_wav = "tests/evidence/audio.wav"

[quality.scenes]
title = "title"
tutorial = "tutorial"
gameplay = "tuning"
pause = "pause"
result = "result"

[[scenes]]
id = "title"
assets = ["title_art", "title_song", "tune_left", "tune_right", "confirm"]

[[scenes]]
id = "tutorial"
assets = ["night_song", "tune_left", "tune_right", "gain", "gate", "confirm", "lock", "error", "pause"]

[[scenes]]
id = "tuning"
assets = ["night_song", "tune_left", "tune_right", "gain", "gate", "confirm", "lock", "error", "complete", "failure", "pause"]

[[scenes]]
id = "pause"
assets = ["night_song", "confirm", "pause"]

[[scenes]]
id = "result"
assets = ["night_song", "confirm", "complete", "failure"]

[[assets]]
id = "title_art"
type = "fullscreen"
source = "assets/title.png"
group = "title"

[[assets]]
id = "title_song"
type = "music"
source = "assets/audio/title.toml"
group = "title"

[[assets]]
id = "night_song"
type = "music"
source = "assets/audio/night.toml"
group = "night"

[[assets]]
id = "tune_left"
type = "sfx"
source = "assets/audio/tune-left.toml"
group = "common"

[[assets]]
id = "tune_right"
type = "sfx"
source = "assets/audio/tune-right.toml"
group = "common"

[[assets]]
id = "gain"
type = "sfx"
source = "assets/audio/gain.toml"
group = "common"

[[assets]]
id = "gate"
type = "sfx"
source = "assets/audio/gate.toml"
group = "common"

[[assets]]
id = "confirm"
type = "sfx"
source = "assets/audio/confirm.toml"
group = "common"

[[assets]]
id = "lock"
type = "sfx"
source = "assets/audio/lock.toml"
group = "common"

[[assets]]
id = "error"
type = "sfx"
source = "assets/audio/error.toml"
group = "common"

[[assets]]
id = "complete"
type = "sfx"
source = "assets/audio/complete.toml"
group = "common"

[[assets]]
id = "failure"
type = "sfx"
source = "assets/audio/failure.toml"
group = "common"

[[assets]]
id = "pause"
type = "sfx"
source = "assets/audio/pause.toml"
group = "common"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral title boot"
goal = "Remain on the persistent title before its signal preview begins."
plan = "tests/play/neutral.json"
required_checks = ["RADIO GHOST lettering is readable", "tutorial and night choices remain visible", "title does not auto-start", "background music begins"]

[[play.scenarios]]
id = "interaction"
title = "Tuning school and pause"
goal = "Complete the practice lock, enter the night, exercise direction, gain, gate, a bad lock, pause, and resume."
plan = "tests/play/interaction.json"
required_checks = ["tutorial teaches tune gain gate and lock through actions", "direction arrow and stereo-coded cue agree", "signal and noise meters change", "pause freezes the clock", "resume continues the same night"]
audio = true

[[play.scenarios]]
id = "success"
title = "Assemble the midnight signal"
goal = "Use narrow tuning and phase-specific gain to lock whisper, chorus, and beacon before dawn."
plan = "tests/play/success.json"
outcome = "tests/outcomes/success.json"
required_checks = ["target direction reverses between phases", "three distinct phase locks succeed", "signal result reports score and errors", "completion cue wins SFX arbitration"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Dawn failure"
goal = "Make repeated bad locks until their time penalties end the night."
plan = "tests/play/failure.json"
outcome = "tests/outcomes/failure.json"
required_checks = ["bad locks reduce remaining time", "direction and visual adjustment cues remain available", "dawn result appears", "failure cue wins SFX arbitration"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Receiver replay"
goal = "Reach dawn, replay, and verify a fresh night with music and receiver state restored."
plan = "tests/play/reset.json"
outcome = "tests/outcomes/reset.json"
required_checks = ["dawn result is reached", "A replay restores frequency gain gate clues score and clock", "night music restarts at row zero"]
audio = true

[[play.scenarios]]
id = "deterministic"
title = "Deterministic signal replay"
goal = "Replay the complete three-phase acquisition from a fresh boot."
plan = "tests/play/deterministic.json"
outcome = "tests/outcomes/deterministic.json"
required_checks = ["canonical state and three-lock result match success", "frame and WAV evidence match on repeated execution"]
audio = true

[[play.scenarios]]
id = "attract"
title = "Deterministic signal preview"
goal = "Wait at the untouched title until its deterministic signal preview begins."
plan = "tests/play/attract.json"
required_checks = ["title remains active", "THE DIAL IS LISTENING appears after the declared timeout", "preview animation is deterministic"]
audio = true

[[play.scenarios]]
id = "menu-input"
title = "Title receiver choice"
goal = "Use either directional cluster to select Night without starting it."
plan = "tests/play/menu-input.json"
required_checks = ["selection moves from Tutorial to Night", "title remains active", "navigation cue is audible"]
audio = true

[[play.scenarios]]
id = "tutorial"
title = "Practice signal lock"
goal = "Tune, set gain, open the gate, and complete the practice lock without entering the scored night."
plan = "tests/play/tutorial.json"
required_checks = ["each instruction advances only after its action", "practice lock reaches READY", "frequency gain gate and direction remain visible"]
audio = true

[[play.scenarios]]
id = "pause"
title = "Clock-safe pause"
goal = "Begin a night and pause it, leaving the clock and receiver frozen."
plan = "tests/play/pause.json"
required_checks = ["pause menu appears", "clock is frozen", "resume retry and title choices are visible", "music is paused after its cue"]

[[play.scenarios]]
id = "save-restart"
title = "Journaled record reload"
goal = "Complete a signal, commit the record, return to title, and reload the best score from cartridge SRAM."
plan = "tests/play/save-restart.json"
outcome = "tests/outcomes/save-restart.json"
required_checks = ["success record is committed through the two-slot SDK journal", "returning to title reloads SRAM", "title displays the saved best score", "power-cycle and corrupt-slot recovery remain Save RTC Laboratory gates"]
audio = true

[[play.scenarios]]
id = "audio"
title = "Directional radio cue"
goal = "Begin a night and end the capture on a leftward tuning cue over the gameplay music."
plan = "tests/play/audio.json"
required_checks = ["night music is audible", "tune cue differs from the title mix", "left and right PCM energy are measurably different", "pitch and SEEK arrow remain mono-safe equivalents"]
audio = true
