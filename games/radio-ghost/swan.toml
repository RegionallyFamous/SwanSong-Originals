schema_version = 1

[sdk]
version = "0.2.0"
revision = "sha256:a9d93aa45ba8d1d5c5ce62cc04dd9f59692d7e0a849a899f6ceac15118b9b4d0"

[game]
id = "radio-ghost"
title = "Radio Ghost"
version = "1.0.0"
template = "menu-puzzle"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 4
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
tune_down = ["X4", "Y1"]
tune_up = ["X2", "Y3"]
gain_up = ["X3", "Y2"]
gain_down = ["X1", "Y4"]
lock_signal = ["A"]
toggle_gate = ["B"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "tuning"
[[scenes]]
id = "result"

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable receiver screen from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["frequency and gain are visible", "clock is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Receiver controls"
goal = "Tune frequency, adjust gain, switch the gate, and attempt a lock."
plan = "tests/play/interaction.json"
required_checks = ["frequency changes", "gain changes", "gate changes", "tuning produces audible feedback"]
audio = true

[[play.scenarios]]
id = "success"
title = "First signal acquisition"
goal = "Tune exactly to the first signal and expose it."
plan = "tests/play/success.json"
required_checks = ["frequency reaches the first target", "signal marker appears", "tuning feedback is audible"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Dawn failure"
goal = "Make repeated bad locks until the night ends."
plan = "tests/play/failure.json"
required_checks = ["bad locks reduce remaining time", "dawn result appears", "receiver does not hang"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Receiver replay"
goal = "Reach dawn and replay from a fresh night."
plan = "tests/play/reset.json"
required_checks = ["dawn result is reached", "replay restores the starting frequency", "night clock resets"]
audio = true

[[play.scenarios]]
id = "deterministic"
title = "Deterministic signal replay"
goal = "Replay the first signal acquisition from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["frequency and signal state match the utility path", "frame and WAV evidence match on repeated execution"]
audio = true
