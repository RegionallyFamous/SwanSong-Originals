schema_version = 1

[game]
id = "turncoat-tactics"
title = "Turncoat Tactics"
version = "1.0.0"
template = "grid-tactics"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 6
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
up = ["X3", "Y2"]
down = ["X1", "Y4"]
select_or_act = ["A"]
recruit = ["B"]
end_turn = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "battle"
[[scenes]]
id = "result"

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable tactics board from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["board and units are visible", "cursor is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Tactics controls"
goal = "Move the cursor, select or act, attempt recruitment, and end a turn."
plan = "tests/play/interaction.json"
required_checks = ["cursor moves", "selection changes", "actions produce feedback", "turn advances"]
[[play.scenarios]]
id = "success"
title = "Successful unit action"
goal = "Select an ally and move it to an adjacent open tile."
plan = "tests/play/success.json"
required_checks = ["ally selection is visible", "unit moves to the cursor", "turn count advances"]

[[play.scenarios]]
id = "failure"
title = "Turn-limit defeat"
goal = "End turns until the tactical turn limit is exhausted."
plan = "tests/play/failure.json"
required_checks = ["turn count reaches zero", "loss result appears", "result remains stable"]

[[play.scenarios]]
id = "reset"
title = "Battle replay"
goal = "Reach turn-limit defeat and replay the battle."
plan = "tests/play/reset.json"
required_checks = ["loss result is reached", "replay restores initial unit positions", "turn count resets"]

[[play.scenarios]]
id = "deterministic"
title = "Deterministic tactics replay"
goal = "Replay the successful unit action from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["unit and turn state match the success path", "frame evidence matches on repeated execution"]
