schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:47c8f48d2e2c7f3d4ed8b6e2adea963007d8ce325b90f410d7509d77c25f3001"

[game]
id = "turncoat-tactics"
title = "Turncoat Tactics"
version = "1.0.0"
template = "grid-tactics"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 6
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
up = ["X3", "Y2"]
down = ["X1", "Y4"]
select_or_act = ["A"]
recruit = ["B"]
end_turn = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "battle"
[[scenes]]
id = "result"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable tactics board from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["board and units are visible", "cursor is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Tactics controls"
goal = "Move the cursor, select or act, attempt recruitment, and end a turn."
plan = "tests/play/interaction.json"
required_checks = ["cursor moves", "selected unit range is marked", "selection, movement, and failed recruitment produce distinct feedback", "turn advances"]
audio = true
[[play.scenarios]]
id = "success"
title = "Recruitment victory"
goal = "Recruit a weakened enemy, use the new ally, and eliminate the final enemy force."
plan = "tests/play/success.json"
required_checks = ["selected unit range is visible", "an enemy joins the recruit track", "the recruited ally takes an action", "enemy count reaches zero", "win result appears"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Commander defeat"
goal = "End turns without acting until the enemy force overwhelms the commander."
plan = "tests/play/failure.json"
required_checks = ["enemy advance is visible", "commander health reaches zero", "loss result appears", "result remains stable"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Battle replay"
goal = "Reach commander defeat and replay the battle."
plan = "tests/play/reset.json"
required_checks = ["loss result is reached", "replay restores initial unit positions", "turn count resets"]

[[play.scenarios]]
id = "deterministic"
title = "Deterministic tactics replay"
goal = "Replay the complete recruitment victory from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["recruitment and win state match the success path", "frame and WAV evidence match on repeated execution"]
audio = true
