schema_version = 1

[sdk]
version = "0.3.1"
revision = "sha256:92c2f3b0823465c0d0b0d4e094ef3b2c89fcbf2e984a364cb1021e95e6043874"

[game]
id = "one-last-lap"
title = "One Last Lap"
version = "1.0.0"
template = "arcade-action"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 9
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
up = ["X3", "Y2"]
down = ["X1", "Y4"]
accelerate_or_replay = ["A"]
brake = ["B"]
tow = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "race"
[[scenes]]
id = "result"

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable race screen from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["racer, rivals, and hazards are visible", "battery is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Race controls"
goal = "Change lanes, accelerate, brake, and exercise the tow control."
plan = "tests/play/interaction.json"
required_checks = ["lane changes", "speed changes", "battery changes", "rivals and hazards affect play"]

[[play.scenarios]]
id = "success"
title = "Racing utility outcome"
goal = "Choose a lane, accelerate, and make sustained race progress."
plan = "tests/play/success.json"
required_checks = ["lane changes", "speed increases", "lap progress advances", "rivals or hazards visibly affect play"]

[[play.scenarios]]
id = "failure"
title = "Battery failure"
goal = "Accelerate until the racer exhausts its battery."
plan = "tests/play/failure.json"
required_checks = ["battery decreases under racing load", "battery result appears", "result remains stable"]

[[play.scenarios]]
id = "reset"
title = "Race replay"
goal = "Reach battery failure and replay the race."
plan = "tests/play/reset.json"
required_checks = ["battery result is reached", "replay restores lap one", "battery, lane, and speed reset"]

[[play.scenarios]]
id = "deterministic"
title = "Deterministic race replay"
goal = "Replay the sustained progress path from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["lap, progress, rivals, and battery match the success path", "frame evidence matches on repeated execution"]
