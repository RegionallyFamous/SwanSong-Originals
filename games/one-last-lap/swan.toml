schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:905d1b7683ea55aebb90703bc4dc708ae7a436c98dae1474e67c9df89601a35c"

[game]
id = "one-last-lap"
title = "One Last Lap"
version = "1.0.0"
template = "arcade-action"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 9
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
accelerate_or_replay = ["A"]
brake = ["B"]
tow = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "race"
[[scenes]]
id = "result"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable race screen from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["racer, rivals, and hazards are visible", "battery is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Race controls"
goal = "Change lanes, accelerate, brake, and confirm the tow signal waits for the lap-two rescue zone."
plan = "tests/play/interaction.json"
required_checks = ["lane changes", "speed and battery change", "tow does not trigger on lap one", "rivals and hazards affect play"]

[[play.scenarios]]
id = "success"
title = "Cooperative finish"
goal = "Signal for a tow, rescue the stranded rival during lap two, and finish all three laps together."
plan = "tests/play/success.json"
required_checks = ["lap-two tow is accepted", "the rescue marker stays visible", "all three laps finish", "cooperative ending appears"]
audio = true

[[play.scenarios]]
id = "solo"
title = "Solo finish"
goal = "Finish all three laps without towing the stranded rival."
plan = "tests/play/solo.json"
required_checks = ["the stranded rival is not rescued", "all three laps finish", "solo ending appears", "solo ending differs from cooperative ending"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Battery failure"
goal = "Hold throttle and brake together until sustained strain exhausts the battery."
plan = "tests/play/failure.json"
required_checks = ["conflicting throttle and brake drain the battery", "battery result appears", "result remains stable"]

[[play.scenarios]]
id = "reset"
title = "Race replay"
goal = "Reach the throttle-and-brake battery failure and replay the race."
plan = "tests/play/reset.json"
required_checks = ["battery result is reached", "replay restores lap one", "battery, lane, and speed reset"]

[[play.scenarios]]
id = "deterministic"
title = "Deterministic cooperative replay"
goal = "Replay the complete rescue-and-finish path from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["tow state, finish, and cooperative ending match the success path", "frame and audio evidence match on repeated execution"]
audio = true
