schema_version = 1

[sdk]
version = "0.5.0"
revision = "sha256:131099c3601a31146bf09121ec6bf98a8059ddf58fd0c7935029d0a0c620969b"

[game]
id = "one-last-lap"
title = "One Last Lap"
version = "1.0.0"
template = "arcade-action"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 9
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
accelerate_or_replay = ["A"]
brake = ["B"]
start_game = ["START"]
tow = ["X1", "Y4"]
pause = ["START"]
return_title = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 48
sprites_per_scanline = 16
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 34
sprites_per_scanline = 15

[[scenes]]
id = "intro"
assets = ["race_song"]
[[scenes]]
id = "race"
assets = ["race_song"]
[[scenes]]
id = "result"
assets = ["race_song"]

[[assets]]
id = "race_song"
type = "music"
source = "assets/audio/race.toml"
group = "race"

[play]
ready_frames = 120

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Hold on the real title screen until the player explicitly starts."
plan = "tests/play/neutral.json"
required_checks = ["title and original road artwork remain stable", "PRESS START blinks", "music plays without input", "the race does not auto-start"]
audio = true

[[play.scenarios]]
id = "interaction"
title = "Race controls"
goal = "Start the race, clear the countdown, drive, change lanes, brake, pause, and resume."
plan = "tests/play/interaction.json"
required_checks = ["3-2-1-GO countdown appears", "road and sprite actors visibly move", "lane, speed, and battery respond", "pause freezes play and resume continues", "music and distinct control effects are audible"]
audio = true

[[play.scenarios]]
id = "success"
title = "Cooperative finish"
goal = "Signal for a tow, rescue the stranded rival during lap two, and finish all three laps together."
plan = "tests/play/success.json"
outcome = "tests/outcomes/success.json"
required_checks = ["lap-two tow is accepted after braking and moving left", "tow status changes", "all three laps finish", "cooperative ending shows rank, time, and score"]
audio = true

[[play.scenarios]]
id = "solo"
title = "Solo finish"
goal = "Finish all three laps without towing the stranded rival."
plan = "tests/play/solo.json"
outcome = "tests/outcomes/solo.json"
required_checks = ["the stranded rival is not rescued", "all three laps finish", "solo ending shows rank, time, and score", "solo ending differs from cooperative ending"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Battery failure"
goal = "Hold throttle and brake together until sustained strain exhausts the battery."
plan = "tests/play/failure.json"
outcome = "tests/outcomes/failure.json"
required_checks = ["conflicting throttle and brake drain the battery", "battery result appears", "result remains stable"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Race replay"
goal = "Reach the throttle-and-brake battery failure and replay the race."
plan = "tests/play/reset.json"
outcome = "tests/outcomes/reset.json"
required_checks = ["battery result is reached", "replay returns to the countdown", "battery, lane, speed, clocks, sprites, and music reset"]
audio = true

[[play.scenarios]]
id = "deterministic"
title = "Deterministic cooperative replay"
goal = "Replay the complete rescue-and-finish path from a fresh boot."
plan = "tests/play/deterministic.json"
outcome = "tests/outcomes/deterministic.json"
required_checks = ["tow state, finish, and cooperative ending match the success path", "frame and audio evidence match on repeated execution"]
audio = true
