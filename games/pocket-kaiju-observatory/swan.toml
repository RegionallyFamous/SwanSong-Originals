schema_version = 1

[game]
id = "pocket-kaiju-observatory"
title = "Pocket Kaiju Observatory"
version = "1.0.0"
template = "arcade-action"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "intro"

[cartridge]
publisher_id = 0
game_id = 7
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4", "Y1"]
right = ["X2", "Y3"]
up = ["X3", "Y2"]
down = ["X1", "Y4"]
photograph = ["A"]
hide = ["B"]
toggle_zoom = ["START"]

[budgets]
rom_bytes = 262144
work_ram_bytes = 16384
vram_tiles = 512
palettes = 16
sprites = 128
sprites_per_scanline = 32
audio_bytes = 8192

[resources]
work_ram_bytes = 8192
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "intro"
[[scenes]]
id = "observation"
[[scenes]]
id = "result"

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach the stable observatory screen from a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["subject and camera frame are visible", "disturbance is visible", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "Observation controls"
goal = "Move the camera, change zoom, hide, and take a photograph."
plan = "tests/play/interaction.json"
required_checks = ["camera moves", "zoom changes framing", "hide changes state", "photograph produces feedback"]
audio = true

[[play.scenarios]]
id = "success"
title = "Useful field evidence"
goal = "Move into photographic range and capture valid behavior evidence."
plan = "tests/play/success.json"
required_checks = ["camera reaches valid range", "photograph is accepted", "evidence state advances"]
audio = true

[[play.scenarios]]
id = "failure"
title = "Disturbance failure"
goal = "Take repeated poor photographs until disturbance reaches its limit."
plan = "tests/play/failure.json"
required_checks = ["poor photographs raise disturbance", "failure result appears", "result remains stable"]
audio = true

[[play.scenarios]]
id = "reset"
title = "Observatory replay"
goal = "Reach disturbance failure and replay the observation."
plan = "tests/play/reset.json"
required_checks = ["failure result is reached", "replay restores camera and subject", "disturbance and evidence reset"]
audio = true

[[play.scenarios]]
id = "deterministic"
title = "Deterministic evidence replay"
goal = "Replay the valid photograph path from a fresh boot."
plan = "tests/play/deterministic.json"
required_checks = ["camera and evidence state match the success path", "frame and WAV evidence match on repeated execution"]
audio = true
